<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Rondas — SAICAPAPER</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--dark:#0f172a;--gray:#64748b;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--amber:#d97706}
body{background:var(--bg);font-family:'Raleway',system-ui,sans-serif;color:var(--dark);-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ── TOPBAR ── */
.topbar{background:#0f172a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#22d37e,#0ea860);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.topbar h1{font-size:16px;font-weight:800;color:#22d37e;letter-spacing:2px;text-transform:uppercase}
.topbar-sub{font-size:12px;color:#64748b;font-weight:600}
.topbar-actions{display:flex;gap:8px}
.topbar-actions button{padding:8px 16px;font-size:13px;font-weight:800;border-radius:8px;border:none;cursor:pointer;font-family:inherit}
.btn-print{background:#1e293b;color:#94a3b8;border:1px solid #334155!important}
.btn-print:hover{background:#334155;color:#fff}
.btn-refresh{background:#22d37e;color:#0f172a}

/* ── CONFIG BAR ── */
.config{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.config label{font-size:13px;font-weight:700;color:var(--gray)}
.config input,.config select{padding:8px 12px;font-size:14px;font-weight:700;border-radius:8px;border:2px solid var(--border);font-family:inherit;background:#f8fafc}
.config input:focus,.config select:focus{outline:none;border-color:var(--blue)}
.config .status{margin-left:auto;font-size:13px;font-weight:700;color:var(--gray)}

/* ── REPORT ── */
.report{max-width:1000px;margin:24px auto;padding:0 16px}
.report-empty{text-align:center;padding:80px 20px;color:var(--gray);font-size:16px;font-weight:600}

/* ── REPORT HEADER ── */
.rpt-header{background:#fff;border:2px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.rpt-title{font-size:22px;font-weight:900;color:var(--dark)}
.rpt-meta{display:flex;gap:20px;flex-wrap:wrap}
.rpt-meta-item{text-align:center}
.rpt-meta-label{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
.rpt-meta-value{font-size:16px;font-weight:900;color:var(--dark);margin-top:2px}
.rpt-turno{display:inline-block;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:900;color:#fff}
.turno-m{background:#f59e0b}
.turno-t{background:#f97316}
.turno-n{background:#6366f1}
.rpt-progress{width:100%;height:8px;border-radius:4px;background:#e2e8f0;margin-top:12px;overflow:hidden}
.rpt-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#06b6d4);transition:width .3s}

/* ── ZONE BLOCK ── */
.zone-block{background:#fff;border:2px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.zone-header{padding:14px 20px;font-size:16px;font-weight:900;color:#fff;display:flex;justify-content:space-between;align-items:center}
.zone-badge{font-size:12px;font-weight:800;background:rgba(255,255,255,0.25);padding:3px 10px;border-radius:12px}

/* ── SECTION ── */
.sec-header{padding:10px 20px;font-size:14px;font-weight:800;color:var(--dark);background:#f1f5f9;border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;justify-content:space-between}
.sec-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px}
.sec-badge.ok{background:#dcfce7;color:var(--green)}
.sec-badge.partial{background:#dbeafe;color:var(--blue)}
.sec-badge.empty{background:#f1f5f9;color:var(--gray)}

/* ── ITEMS TABLE ── */
.items-table{width:100%;border-collapse:collapse}
.items-table tr{border-bottom:1px solid #f1f5f9}
.items-table tr:last-child{border-bottom:none}
.items-table td{padding:10px 20px;font-size:14px;vertical-align:middle}
.items-table .it-label{font-weight:600;color:#334155;width:60%}
.items-table .it-limit{font-size:11px;color:var(--gray);font-family:'JetBrains Mono',monospace;font-weight:600}
.items-table .it-value{text-align:right;font-weight:800;width:40%}
.val-ok{color:var(--green);background:#f0fdf4;border-radius:6px;padding:4px 12px;display:inline-block}
.val-nok{color:#fff;background:var(--red);border-radius:6px;padding:4px 12px;display:inline-block}
.val-si{color:var(--green)}
.val-no{color:var(--red)}
.val-num{color:var(--blue);font-family:'JetBrains Mono',monospace}
.val-text{color:var(--dark);font-style:italic}
.val-sel{color:var(--blue);font-weight:800}
.val-blanco{color:#475569;background:#f1f5f9;border-radius:6px;padding:4px 12px;display:inline-block}
.val-rojo{color:#fff;background:var(--red);border-radius:6px;padding:4px 12px;display:inline-block}
.val-empty{color:#cbd5e1;font-weight:500;font-style:italic}
.it-photos{display:flex;gap:4px;justify-content:flex-end;margin-top:4px}
.it-photos img{width:40px;height:40px;border-radius:6px;object-fit:cover;border:2px solid var(--border);cursor:pointer}

/* ── OBS ── */
.obs-block{background:#fff;border:2px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.obs-title{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:8px}
.obs-text{font-size:14px;color:#475569;font-weight:500;white-space:pre-wrap;line-height:1.6}

/* ── PHOTO MODAL ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.modal.show{display:flex}
.modal img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}

/* ── RONDA SELECTOR ── */
.ronda-list{display:flex;gap:8px;flex-wrap:wrap;padding:16px 24px;background:#fff;border-bottom:1px solid var(--border)}
.ronda-chip{padding:8px 14px;font-size:12px;font-weight:800;border-radius:8px;border:2px solid var(--border);cursor:pointer;background:#f8fafc;color:var(--dark);transition:all .15s}
.ronda-chip:hover{border-color:var(--blue);background:#eff6ff}
.ronda-chip.active{border-color:var(--blue);background:var(--blue);color:#fff}
.ronda-chip .chip-turno{font-size:10px;font-weight:700;opacity:0.7;margin-left:4px}

/* ── NOK SUMMARY ── */
.nok-summary{background:#fef2f2;border:2px solid #fecaca;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.nok-title{font-size:14px;font-weight:900;color:var(--red);margin-bottom:8px}
.nok-item{font-size:13px;font-weight:600;color:#991b1b;padding:3px 0}

/* ── PRINT ── */
@media print{
  .topbar,.config,.ronda-list,.topbar-actions,.export-bar{display:none!important}
  .report{margin:0;padding:0;max-width:100%}
  .zone-block,.rpt-header,.obs-block,.nok-summary{break-inside:avoid;page-break-inside:avoid}
  body{background:#fff}
}

/* ── EXPORT BAR ── */
.export-bar{background:#f0fdf4;border-bottom:1px solid #bbf7d0;padding:14px 24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.export-bar label{font-size:12px;font-weight:800;color:#15803d;text-transform:uppercase;letter-spacing:0.5px}
.export-bar input[type=date]{padding:8px 12px;font-size:14px;font-weight:700;border-radius:8px;border:2px solid #86efac;font-family:inherit;background:#fff;color:var(--dark)}
.export-bar input[type=date]:focus{outline:none;border-color:var(--green)}
.btn-export{padding:10px 20px;font-size:13px;font-weight:900;border-radius:8px;border:none;cursor:pointer;font-family:inherit;background:#16a34a;color:#fff;letter-spacing:0.5px;transition:all .15s}
.btn-export:hover{background:#15803d}
.btn-export:active{transform:scale(0.97)}
.btn-export:disabled{opacity:0.4;cursor:not-allowed}
.export-info{font-size:12px;font-weight:700;color:#15803d;margin-left:auto}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

      <div class="topbar-sub">Visor de Informes de Ronda</div>

  </div>
  <div class="topbar-actions">
    <button class="btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>

    <label>API Key (anon public)</label><br>
    <input type="text" id="cfgKey" placeholder="eyJhbG..." style="width:280px" oninput="saveConfig()">

    <label>Filtrar turno</label><br>

      <option value="Tarde">Tarde</option>
      <option value="Noche">Noche</option>
    </select>
  </div>
  <div class="status" id="statusText">Configura Supabase para cargar datos</div>
</div>

<!-- EXPORT BAR -->
<div class="export-bar">
  <div>
    <label>Desde</label><br>
    <input type="date" id="dateFrom">
  </div>
  <div>
    <label>Hasta</label><br>
    <input type="date" id="dateTo">
  </div>
  <div>
    <label>Turno</label><br>
    <select id="exportTurno" style="padding:8px 12px;font-size:14px;font-weight:700;border-radius:8px;border:2px solid #86efac;font-family:inherit;background:#fff">
      <option value="">Todos</option>
      <option value="Mañana">Mañana</option>
      <option value="Tarde">Tarde</option>
      <option value="Noche">Noche</option>

  </div>
  <button class="btn-export" onclick="exportExcel()">📊 EXPORTAR EXCEL</button>
  <div class="export-info" id="exportInfo"></div>
</div>

<!-- RONDA LIST -->
<div class="ronda-list" id="rondaList"></div>

<!-- REPORT -->
<div class="report" id="reportArea">
  <div class="report-empty">Configura la conexión a Supabase y pulsa Actualizar</div>
</div>

<!-- PHOTO MODAL -->
<div class="modal" id="photoModal" onclick="this.classList.remove('show')">

const itemMap={};
ZONES.forEach(z=>z.sections.forEach(s=>s.items.forEach(it=>{itemMap[it.id]=it;})));

let rondas=[];
let currentRonda=null;

function saveConfig(){
  const url=document.getElementById("cfgUrl").value.trim();
  const key=document.getElementById("cfgKey").value.trim();
  try{localStorage.setItem("sb_url",url);localStorage.setItem("sb_key",key);}catch(e){}
}
function loadConfig(){
  try{
    document.getElementById("cfgUrl").value=localStorage.getItem("sb_url")||"";
    document.getElementById("cfgKey").value=localStorage.getItem("sb_key")||"";
  }catch(e){}
}

async function loadRondas(){
  const url=document.getElementById("cfgUrl").value.trim();
  const key=document.getElementById("cfgKey").value.trim();
  if(!url||!key){document.getElementById("statusText").textContent="⚠️ Rellena URL y Key";return;}
  document.getElementById("statusText").textContent="Cargando...";
  try{
    const r=await fetch(url+"/rest/v1/rondas?order=created_at.desc&limit=50",{headers:{apikey:key,Authorization:"Bearer "+key}});
    if(!r.ok){document.getElementById("statusText").textContent="Error: "+r.status;return;}
    rondas=await r.json();
    document.getElementById("statusText").textContent="✅ "+rondas.length+" rondas cargadas";
    filterRondas();
  }catch(e){document.getElementById("statusText").textContent="❌ Error de conexión";}
}

function filterRondas(){
  const turno=document.getElementById("cfgTurno").value;
  const filtered=turno?rondas.filter(r=>r.turno===turno):rondas;
  renderList(filtered);
  if(filtered.length>0){currentRonda=filtered[0];renderReport(filtered[0]);}
  else{document.getElementById("reportArea").innerHTML='<div class="report-empty">No hay rondas con ese filtro</div>';}
}

function renderList(list){
  const el=document.getElementById("rondaList");
  el.innerHTML=list.map((r,i)=>{
    const tc=r.turno==="Mañana"?"turno-m":r.turno==="Tarde"?"turno-t":"turno-n";
    return `<div class="ronda-chip${currentRonda&&currentRonda.id===r.id?" active":""}" onclick="selectRonda(${i})">${r.fecha_display||new Date(r.fecha).toLocaleDateString("es-ES")}<span class="chip-turno ${tc}">&nbsp;${r.turno}&nbsp;</span></div>`;
  }).join("");
}

function selectRonda(i){
  const turno=document.getElementById("cfgTurno").value;
  const filtered=turno?rondas.filter(r=>r.turno===turno):rondas;
  currentRonda=filtered[i];
  renderList(filtered);
  renderReport(currentRonda);
}

function fmtVal(id,val,fotos){
  if(val==null||val==="")return'<span class="val-empty">— sin dato —</span>';
  if(val==="OK")return'<span class="val-ok">✓ OK</span>';
  if(val==="NOK")return'<span class="val-nok">✗ NOK</span>';
  if(val==="SÍ")return'<span class="val-si">✓ SÍ</span>';
  if(val==="NO")return'<span class="val-no">✗ NO</span>';
  if(val==="Blanco")return'<span class="val-blanco">⬜ Blanco</span>';
  if(val==="Rojo")return'<span class="val-rojo">🔴 Rojo</span>';
  if(Array.isArray(val))return'<span class="val-sel">'+val.join(", ")+"</span>";
  const it=itemMap[id];
  if(it&&(it.type==="num"))return'<span class="val-num">'+val+"</span>";
  return'<span class="val-text">'+val+"</span>";
}

function renderReport(r){
  if(!r)return;
  const vals=r.valores||{};
  const fotos=r.fotos||{};
  const pct=r.total_puntos?Math.round(r.puntos_rellenados/r.total_puntos*100):0;
  const tc=r.turno==="Mañana"?"turno-m":r.turno==="Tarde"?"turno-t":"turno-n";

  // Count NOKs
  const noks=[];
  Object.entries(vals).forEach(([k,v])=>{if(v==="NOK"){const it=itemMap[k];noks.push(it?it.label:k);}});

  let h=`<div class="rpt-header">
    <div><div class="rpt-title">Informe de Ronda</div>
    <div class="rpt-progress"><div class="rpt-progress-fill" style="width:${pct}%"></div></div></div>
    <div class="rpt-meta">
      <div class="rpt-meta-item"><div class="rpt-meta-label">Fecha</div><div class="rpt-meta-value">${r.fecha_display||new Date(r.fecha).toLocaleDateString("es-ES")}</div></div>
      <div class="rpt-meta-item"><div class="rpt-meta-label">Turno</div><div class="rpt-turno ${tc}">${r.turno}</div></div>
      <div class="rpt-meta-item"><div class="rpt-meta-label">Completado</div><div class="rpt-meta-value">${r.puntos_rellenados}/${r.total_puntos} (${pct}%)</div></div>
      <div class="rpt-meta-item"><div class="rpt-meta-label">NOK</div><div class="rpt-meta-value" style="color:${noks.length?"var(--red)":"var(--green)"}"> ${noks.length}</div></div>
    </div>
  </div>`;

  // NOK Summary
  if(noks.length>0){
    h+=`<div class="nok-summary"><div class="nok-title">⚠️ ${noks.length} punto${noks.length>1?"s":""} NO OK</div>`;
    noks.forEach(n=>{h+=`<div class="nok-item">• ${n}</div>`;});
    h+=`</div>`;
  }

  // Zones
  for(const zone of ZONES){
    const zoneItems=zone.sections.flatMap(s=>s.items);
    const zoneFilled=zoneItems.filter(it=>vals[it.id]!=null&&vals[it.id]!=="").length;
    if(zoneFilled===0)continue;

    h+=`<div class="zone-block"><div class="zone-header" style="background:${zone.color}"><span>${zone.name}</span><span class="zone-badge">${zoneFilled}/${zoneItems.length}</span></div>`;

    for(const sec of zone.sections){
      const secFilled=sec.items.filter(it=>vals[it.id]!=null&&vals[it.id]!=="").length;
      if(secFilled===0)continue;
      const sp=Math.round(secFilled/sec.items.length*100);
      const cls=sp===100?"ok":sp>0?"partial":"empty";

      h+=`<div class="sec-header"><span>${sec.name}</span><span class="sec-badge ${cls}">${sp}%</span></div>`;
      h+=`<table class="items-table">`;

      for(const it of sec.items){
        const v=vals[it.id];
        if(v==null&&v==="")continue;
        const photoList=fotos[it.id]||[];
        h+=`<tr><td class="it-label">${it.label}`;
        if(it.limit)h+=` <span class="it-limit">${it.limit}</span>`;
        h+=`</td><td class="it-value">${fmtVal(it.id,v,photoList)}`;
        if(photoList.length>0){
          h+=`<div class="it-photos">`;
          photoList.forEach(url=>{h+=`<img src="${url}" onclick="openPhoto('${url}')" title="Ver foto">`;});
          h+=`</div>`;
        }
        h+=`</td></tr>`;
      }
      h+=`</table>`;
    }
    h+=`</div>`;
  }

  // Observations
  if(r.observaciones){
    h+=`<div class="obs-block"><div class="obs-title">📝 Observaciones</div><div class="obs-text">${r.observaciones}</div></div>`;
  }

  document.getElementById("reportArea").innerHTML=h;
}

function openPhoto(url){
  document.getElementById("modalImg").src=url;
  document.getElementById("photoModal").classList.add("show");
}

/* ══════════════════════════════════════════
   EXCEL EXPORT
   ══════════════════════════════════════════ */
function initDates(){
  const today=new Date();
  const weekAgo=new Date(today);weekAgo.setDate(today.getDate()-7);
  document.getElementById("dateTo").value=today.toISOString().slice(0,10);
  document.getElementById("dateFrom").value=weekAgo.toISOString().slice(0,10);
}

async function exportExcel(){
  const url=document.getElementById("cfgUrl").value.trim();
  const key=document.getElementById("cfgKey").value.trim();
  if(!url||!key){alert("Configura Supabase primero");return;}

  const from=document.getElementById("dateFrom").value;
  const to=document.getElementById("dateTo").value;
  const turno=document.getElementById("exportTurno").value;
  if(!from||!to){alert("Selecciona las fechas");return;}

  document.getElementById("exportInfo").textContent="Cargando datos...";

  // Use created_at for range filtering (proper timestamptz column)
  let query=url+"/rest/v1/rondas?order=created_at.asc&created_at=gte."+from+"T00:00:00Z&created_at=lte."+to+"T23:59:59Z";
  if(turno)query+="&turno=eq."+encodeURIComponent(turno);

  let data;
  try{
    const r=await fetch(query,{headers:{apikey:key,Authorization:"Bearer "+key}});
    if(!r.ok){document.getElementById("exportInfo").textContent="Error: "+r.status;return;}
    data=await r.json();
  }catch(e){document.getElementById("exportInfo").textContent="Error de conexión";return;}

  if(!data.length){document.getElementById("exportInfo").textContent="No hay rondas en ese rango";return;}

  document.getElementById("exportInfo").textContent="Generando Excel con "+data.length+" rondas...";

  try{

  const wb=XLSX.utils.book_new();

  /* ── HOJA 1: RESUMEN ── */
  const resRows=[["INFORME DE RONDAS — SAICAPAPER"],[`Periodo: ${from} a ${to}${turno?" — Turno: "+turno:""}`],[""],
    ["#","Fecha","Turno","Puntos","Completados","%","NOKs","Observaciones"]
  ];
  data.forEach((r,i)=>{
    const vals=r.valores||{};
    const noks=Object.values(vals).filter(v=>v==="NOK").length;
    const pct=r.total_puntos?Math.round(r.puntos_rellenados/r.total_puntos*100):0;
    resRows.push([i+1, r.fecha_display||r.fecha?.slice(0,10)||"", r.turno, r.total_puntos||0, r.puntos_rellenados||0, pct+"%", noks, r.observaciones||""]);
  });
  const wsRes=XLSX.utils.aoa_to_sheet(resRows);
  wsRes["!cols"]=[{wch:4},{wch:22},{wch:10},{wch:8},{wch:12},{wch:7},{wch:6},{wch:40}];
  // Merge title
  wsRes["!merges"]=[{s:{r:0,c:0},e:{r:0,c:7}},{s:{r:1,c:0},e:{r:1,c:7}}];
  XLSX.utils.book_append_sheet(wb,wsRes,"Resumen");

  /* ── HOJA 2: DETALLE COMPLETO ── */
  const detRows=[["Fecha","Turno","Zona","Sección","Punto de inspección","Límite","Valor","Estado"]];
  data.forEach(r=>{
    const vals=r.valores||{};
    const fecha=r.fecha_display||r.fecha?.slice(0,10)||"";
    ZONES.forEach(z=>{
      z.sections.forEach(s=>{
        s.items.forEach(it=>{
          const v=vals[it.id];
          if(v==null||v==="")return;
          let display=v;
          let estado="";
          if(Array.isArray(v))display=v.join(", ");
          if(v==="OK")estado="OK";
          else if(v==="NOK")estado="NOK";
          else if(v==="SÍ")estado="OK";
          else if(v==="NO")estado="NOK";
          detRows.push([fecha, r.turno, z.name, s.name, it.label, it.limit||"", display, estado]);
        });
      });
    });
  });
  const wsDet=XLSX.utils.aoa_to_sheet(detRows);
  wsDet["!cols"]=[{wch:22},{wch:10},{wch:22},{wch:20},{wch:35},{wch:12},{wch:18},{wch:8}];
  XLSX.utils.book_append_sheet(wb,wsDet,"Detalle");

  /* ── HOJA 3: SOLO NOKs ── */
  const nokRows=[["PUNTOS NO OK"],[`Periodo: ${from} a ${to}`],[""],
    ["Fecha","Turno","Zona","Sección","Punto","Fotos"]
  ];
  data.forEach(r=>{
    const vals=r.valores||{};
    const fotos=r.fotos||{};
    const fecha=r.fecha_display||r.fecha?.slice(0,10)||"";
    ZONES.forEach(z=>{
      z.sections.forEach(s=>{
        s.items.forEach(it=>{
          if(vals[it.id]==="NOK"){
            const flist=(fotos[it.id]||[]).join("\n");
            nokRows.push([fecha, r.turno, z.name, s.name, it.label, flist]);
          }
        });
      });
    });
  });
  const wsNok=XLSX.utils.aoa_to_sheet(nokRows);
  wsNok["!cols"]=[{wch:22},{wch:10},{wch:22},{wch:20},{wch:35},{wch:50}];
  wsNok["!merges"]=[{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}}];
  XLSX.utils.book_append_sheet(wb,wsNok,"NOKs");

  /* ── HOJA POR CADA ZONA ── */
  ZONES.forEach(z=>{
    const zRows=[[z.name],[""],["Fecha","Turno","Sección","Punto","Límite","Valor","Estado"]];
    let hasData=false;
    data.forEach(r=>{
      const vals=r.valores||{};
      const fecha=r.fecha_display||r.fecha?.slice(0,10)||"";
      z.sections.forEach(s=>{
        s.items.forEach(it=>{
          const v=vals[it.id];
          if(v==null||v==="")return;
          hasData=true;
          let display=Array.isArray(v)?v.join(", "):v;
          let estado=v==="OK"?"OK":v==="NOK"?"NOK":v==="SÍ"?"OK":v==="NO"?"NOK":"";
          zRows.push([fecha, r.turno, s.name, it.label, it.limit||"", display, estado]);
        });
      });
    });
    if(hasData){
      const wsZ=XLSX.utils.aoa_to_sheet(zRows);
      wsZ["!cols"]=[{wch:22},{wch:10},{wch:20},{wch:35},{wch:12},{wch:18},{wch:8}];
      wsZ["!merges"]=[{s:{r:0,c:0},e:{r:0,c:6}}];
      // Sheet name max 31 chars
      const shName=z.name.length>31?z.name.slice(0,31):z.name;
      XLSX.utils.book_append_sheet(wb,wsZ,shName);
    }
  });

  /* ── DESCARGAR ── */
  const filename="Rondas_"+from+"_a_"+to+(turno?"_"+turno:"")+".xlsx";
  XLSX.writeFile(wb,filename);
  document.getElementById("exportInfo").textContent="✅ "+filename+" descargado ("+data.length+" rondas)";

  }catch(e){
    console.error("Excel error:",e);
    document.getElementById("exportInfo").textContent="❌ Error generando Excel: "+e.message;
  }
}

initDates();

loadConfig();
</script>
