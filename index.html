<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Ronda Planta — SAICAPAPER</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root {
  --bg-deep: #060910;
  --bg-base: #0a0e17;
  --bg-card: #0f1420;
  --bg-elevated: #141a28;
  --bg-input: #111827;
  --border-subtle: #1a2035;
  --border-main: #1e2a42;
  --border-focus: #3b82f6;
  --text-primary: #f0f4f8;
  --text-secondary: #b0bdd0;
  --text-tertiary: #6b7fa0;
  --text-muted: #3e4f6e;
  --accent: #22d37e;
  --accent-glow: #22d37e44;
  --accent-dark: #16a35a;
  --blue: #3b82f6;
  --blue-dark: #1e3a8a;
  --blue-glow: #3b82f622;
  --red: #ef4444;
  --red-dark: #7f1d1d;
  --red-glow: #ef444422;
  --amber: #f59e0b;
  --amber-glow: #f59e0b22;
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text-primary);font-family:'Raleway',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ═══════ LAYOUT ═══════ */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ═══════ TOPBAR ═══════ */
.topbar{
  background:linear-gradient(180deg, #0c1019 0%, #0a0e17 100%);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  border-bottom:1px solid var(--border-subtle);position:relative;z-index:60;
}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent)33,transparent)}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#0ea860);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;letter-spacing:-1px;box-shadow:0 2px 12px var(--accent-glow)}
.brand-text{display:flex;flex-direction:column}
.brand-name{font-size:14px;font-weight:800;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;line-height:1}
.brand-sub{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:1px;margin-top:2px}
.top-right{display:flex;align-items:center;gap:10px}
.date-badge{font-size:11px;font-weight:700;color:var(--text-tertiary);background:var(--bg-elevated);padding:5px 10px;border-radius:6px;border:1px solid var(--border-subtle)}
.turno-group{display:flex;gap:3px;background:var(--bg-card);border-radius:10px;padding:3px;border:1px solid var(--border-subtle)}
.turno-btn{padding:6px 14px;font-size:12px;font-weight:800;border-radius:7px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:0.5px}
.turno-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}

/* ═══════ ZONE NAV ═══════ */
.zone-nav{
  background:var(--bg-base);flex-shrink:0;border-bottom:1px solid var(--border-subtle);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;padding:0 8px;
}
.zone-nav::-webkit-scrollbar{display:none}
.zone-chip{
  padding:10px 16px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;
  color:var(--text-muted);transition:all .2s;position:relative;letter-spacing:0.8px;text-transform:uppercase;
  border-bottom:2px solid transparent;flex-shrink:0;
}
.zone-chip:hover{color:var(--text-tertiary)}
.zone-chip.active{color:var(--text-primary)}
.zone-chip .zp{font-size:9px;font-weight:700;margin-left:4px;vertical-align:super}

/* ═══════ SECTION NAV ═══════ */
.sec-nav{
  background:var(--bg-card);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;display:flex;gap:0;padding:0 12px;
  border-bottom:1px solid var(--border-subtle);
}
.sec-nav::-webkit-scrollbar{display:none}
.sec-chip{
  padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  color:var(--text-muted);transition:all .2s;position:relative;flex-shrink:0;
  border-bottom:2px solid transparent;
}
.sec-chip.active{color:var(--text-primary);border-bottom-color:var(--blue)}
.sec-chip .sp{
  display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:5px;vertical-align:middle;
}

/* ═══════ SCROLLABLE BODY ═══════ */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:100px}

/* ═══════ SECTION HEADER IN BODY ═══════ */
.sec-title-bar{
  padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;
}
.sec-title-text{font-size:17px;font-weight:800;color:var(--text-primary);letter-spacing:0.3px}
.sec-title-badge{
  font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;
}

/* ═══════ ITEM ROW ═══════ */
.item{
  padding:14px 20px;border-bottom:1px solid var(--border-subtle);
  transition:background .2s,border-color .2s;position:relative;
}
.item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;
  background:transparent;transition:background .2s;
}
.item.filled{background:var(--accent-glow)}
.item.filled::before{background:var(--accent)}
.item-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.item-indicator{
  width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;
  background:var(--text-muted);transition:all .25s;
}
.item.filled .item-indicator{background:var(--accent);box-shadow:0 0 6px var(--accent-glow)}
.item-label{font-size:16px;font-weight:700;color:var(--text-secondary);line-height:1.4;flex:1}
.item.filled .item-label{color:var(--text-primary)}
.item-limit{
  font-size:11px;font-weight:700;color:var(--text-muted);background:var(--bg-elevated);
  padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:3px;
  border:1px solid var(--border-subtle);font-family:'JetBrains Mono',monospace;
}
.item-note{font-size:12px;color:var(--text-tertiary);margin:0 0 8px 18px;font-weight:600}
.item-ctrl{margin-left:18px}

/* ═══════ OK / NOK BUTTONS ═══════ */
.btn-pair{display:flex;gap:8px}
.btn-ok,.btn-nok{
  flex:1;padding:13px 0;font-size:16px;font-weight:900;border-radius:10px;
  border:2px solid var(--border-main);background:var(--bg-input);
  color:var(--text-muted);cursor:pointer;font-family:'Raleway',sans-serif;
  transition:all .15s;letter-spacing:1px;text-align:center;
}
.btn-ok:active,.btn-nok:active{transform:scale(0.97)}
.btn-ok.on{background:linear-gradient(135deg,#16a34a,#15803d);border-color:#22c55e;color:#fff;box-shadow:0 2px 12px #16a34a44}
.btn-nok.on{background:linear-gradient(135deg,#dc2626,#b91c1c);border-color:#ef4444;color:#fff;box-shadow:0 2px 12px #dc262644}

/* ═══════ YES / NO ═══════ */
.btn-si,.btn-no{
  flex:1;padding:13px 0;font-size:16px;font-weight:900;border-radius:10px;
  border:2px solid var(--border-main);background:var(--bg-input);
  color:var(--text-muted);cursor:pointer;font-family:'Raleway',sans-serif;
  transition:all .15s;letter-spacing:1px;text-align:center;
}
.btn-si.on{background:linear-gradient(135deg,#16a34a,#15803d);border-color:#22c55e;color:#fff;box-shadow:0 2px 12px #16a34a44}
.btn-no.on{background:linear-gradient(135deg,#dc2626,#b91c1c);border-color:#ef4444;color:#fff;box-shadow:0 2px 12px #dc262644}

/* ═══════ BLANCO / ROJO ═══════ */
.btn-bl,.btn-rj{
  flex:1;padding:13px 0;font-size:15px;font-weight:900;border-radius:10px;
  border:2px solid var(--border-main);background:var(--bg-input);
  color:var(--text-muted);cursor:pointer;font-family:'Raleway',sans-serif;
  transition:all .15s;letter-spacing:0.5px;text-align:center;
}
.btn-bl.on{background:linear-gradient(135deg,#475569,#334155);border-color:#64748b;color:#fff;box-shadow:0 2px 12px #47556944}
.btn-rj.on{background:linear-gradient(135deg,#dc2626,#b91c1c);border-color:#ef4444;color:#fff;box-shadow:0 2px 12px #dc262644}

/* ═══════ SELECTION CHIPS ═══════ */
.sel-row{display:flex;gap:6px;flex-wrap:wrap}
.sel-btn{
  padding:11px 16px;font-size:14px;font-weight:800;border-radius:9px;
  border:2px solid var(--border-main);background:var(--bg-input);
  color:var(--text-muted);cursor:pointer;font-family:'Raleway',sans-serif;
  transition:all .15s;min-width:54px;text-align:center;
}
.sel-btn:active{transform:scale(0.96)}
.sel-btn.on{background:linear-gradient(135deg,#1e40af,#1d4ed8);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px var(--blue-glow)}

/* ═══════ NUM INPUT ═══════ */
.num-wrap{position:relative}
.num-input{
  width:100%;padding:13px 16px;font-size:20px;font-weight:700;border-radius:10px;
  border:2px solid var(--border-main);background:var(--bg-input);color:var(--text-primary);
  outline:none;font-family:'JetBrains Mono',monospace;box-sizing:border-box;
  transition:border-color .2s,box-shadow .2s;
}
.num-input::placeholder{color:var(--text-muted)}
.num-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}

/* ═══════ TEXT INPUT ═══════ */
.txt-input{
  width:100%;padding:12px 16px;font-size:16px;font-weight:600;border-radius:10px;
  border:2px solid var(--border-main);background:var(--bg-input);color:var(--text-primary);
  outline:none;font-family:'Raleway',sans-serif;box-sizing:border-box;
  transition:border-color .2s,box-shadow .2s;
}
.txt-input::placeholder{color:var(--text-muted)}
.txt-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}

/* ═══════ PHOTO ═══════ */
.photo-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.photo-btn{
  padding:6px 12px;font-size:12px;font-weight:800;border-radius:7px;
  border:1px solid #92400e55;background:#1a150a;color:var(--amber);
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.photo-btn:active{background:#261d0d}
.photo-thumb{width:32px;height:32px;border-radius:6px;object-fit:cover;border:1px solid #92400e55}

/* ═══════ OBS ═══════ */
.obs-wrap{padding:20px 20px 40px}
.obs-label{font-size:14px;font-weight:800;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.5px}
.obs-textarea{
  width:100%;padding:14px 16px;font-size:15px;font-weight:500;border-radius:12px;
  border:2px solid var(--border-main);background:var(--bg-input);color:var(--text-primary);
  outline:none;resize:vertical;font-family:'Raleway',sans-serif;box-sizing:border-box;min-height:80px;
  transition:border-color .2s;
}
.obs-textarea:focus{border-color:var(--blue)}

/* ═══════ FOOTER ═══════ */
.footer-bar{
  flex-shrink:0;background:linear-gradient(180deg,var(--bg-card),var(--bg-base));
  padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:50;
  border-top:1px solid var(--border-subtle);
}
.footer-bar::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent)22,transparent)}
.f-pct{font-size:13px;font-weight:900;color:var(--text-tertiary);min-width:38px;font-family:'JetBrains Mono',monospace}
.f-bar{flex:1;height:8px;border-radius:4px;background:var(--bg-elevated);overflow:hidden;border:1px solid var(--border-subtle)}
.f-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--blue),#06b6d4)}
.f-fill.done{background:linear-gradient(90deg,var(--accent-dark),var(--accent))}
.f-count{font-size:11px;font-weight:700;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.f-send{
  padding:10px 20px;font-size:13px;font-weight:900;border-radius:9px;border:none;
  cursor:pointer;font-family:'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;
  background:var(--bg-elevated);color:var(--text-muted);transition:all .2s;
}
.f-send.ready{background:linear-gradient(135deg,var(--accent),#0ea860);color:#fff;box-shadow:0 2px 16px var(--accent-glow)}
.f-send:active{transform:scale(0.96)}
.f-send.sending{opacity:.5;pointer-events:none}

/* ═══════ SENT OVERLAY ═══════ */
.sent{display:none;position:fixed;inset:0;background:var(--bg-deep);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.sent.show{display:flex}
.sent-check{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0ea860);display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 4px 30px var(--accent-glow);margin-bottom:24px}
.sent h2{font-size:24px;font-weight:900;margin-bottom:8px;letter-spacing:0.5px}
.sent p{font-size:16px;color:var(--accent);font-weight:700;margin-bottom:24px}
.sent-new{padding:16px 40px;font-size:15px;font-weight:900;border-radius:12px;border:2px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s}
.sent-new:hover{background:var(--accent);color:#fff}

/* ═══════ TOAST ═══════ */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:800;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-family:'Raleway',sans-serif}
.toast.show{opacity:1}
.toast.ok{background:var(--accent-dark);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
.toast.err{background:#991b1b;color:#fff;box-shadow:0 4px 20px var(--red-glow)}
</style>
</head>

{id:"ax4_ofrv",label:"Fugas / Ruidos / Vibraciones",type:"ok"}]}
]},
{id:"erm",name:"ERMs / C.Aux",short:"ERM",color:"#94a3b8",sections:[
{id:"erms",name:"ERM",items:[
{id:"erm_mon",label:"Testigo válvula monitor (100%)",type:"text",note:"S2, S3, S4"},
{id:"erm_prin",label:"Testigo válvula principal (regulando)",type:"text",note:"S2, S3, S4"},
{id:"erm_frv",label:"Fugas / Ruidos / Vibraciones",type:"ok"}]},
{id:"caux",name:"Calderas Aux.",items:[
{id:"caux_p",label:"Presión indicador campo",type:"text",note:"C-11, C-12, C-15"},
{id:"caux_niv",label:"Niveles reales",type:"text",note:"C-11, C-12, C-15"},
{id:"caux_frv",label:"Fugas / Ruidos / Vibraciones",type:"ok"}]}
]}
];

// ── STATE ──
let curZone=ZONES[0].id, curSec=ZONES[0].sections[0].id, curTurno="Mañana";
let V={}, P={}, obs="";

const isFilled=v=>v!=null&&v!==""&&!(Array.isArray(v)&&!v.length);
const allItems=()=>ZONES.flatMap(z=>z.sections.flatMap(s=>s.items));
const total=()=>allItems().length;
const filled=()=>allItems().filter(i=>isFilled(V[i.id])).length;
const pct=()=>{const t=total();return t?Math.round(filled()/t*100):0;};
const zPct=z=>{const it=z.sections.flatMap(s=>s.items);const f=it.filter(i=>isFilled(V[i.id])).length;return it.length?Math.round(f/it.length*100):0;};
const sPct=s=>{const f=s.items.filter(i=>isFilled(V[i.id])).length;return s.items.length?Math.round(f/s.items.length*100):0;};

function getDate(){const d=new Date();return d.toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short",year:"numeric"});}
function getISO(){return new Date().toISOString();}
function toast(m,t){const e=document.getElementById("toast");e.textContent=m;e.className="toast show "+t;setTimeout(()=>e.className="toast",3000);}

// ── RENDER ──
function R(){rDate();rTurnos();rZones();rSecs();rBody();rFooter();}
function rDate(){document.getElementById("dateBadge").textContent=getDate();}
function rTurnos(){
  document.getElementById("turnoGroup").innerHTML=["Mañana","Tarde","Noche"].map(t=>
    `<button class="turno-btn${curTurno===t?" active":""}" onclick="curTurno='${t}';rTurnos()">${t==="Mañana"?"☀️":t==="Tarde"?"🌅":"🌙"} ${t}</button>`
  ).join("");
}
function rZones(){
  const nav=document.getElementById("zoneNav");
  nav.innerHTML=ZONES.map(z=>{
    const p=zPct(z);
    return `<div class="zone-chip${curZone===z.id?" active":""}" style="${curZone===z.id?"border-bottom-color:"+z.color+";color:"+z.color:""}" onclick="pickZone('${z.id}')">${z.short}${p>0?`<span class="zp" style="color:${p===100?"var(--accent)":"var(--blue)"}">${p}%</span>`:""}</div>`;
  }).join("");
}
function rSecs(){
  const z=ZONES.find(x=>x.id===curZone);if(!z)return;
  const nav=document.getElementById("secNav");
  nav.innerHTML=z.sections.map(s=>{
    const p=sPct(s);
    const dotColor=p===100?"var(--accent)":p>0?"var(--blue)":"var(--text-muted)";
    return `<div class="sec-chip${curSec===s.id?" active":""}" onclick="pickSec('${s.id}')">${s.name}<span class="sp" style="background:${dotColor}"></span></div>`;
  }).join("");
}
function rBody(){
  const z=ZONES.find(x=>x.id===curZone);if(!z)return;
  const s=z.sections.find(x=>x.id===curSec);if(!s)return;
  const p=sPct(s);
  const body=document.getElementById("bodyEl");
  let h=`<div class="sec-title-bar"><span class="sec-title-text">${s.name}</span><span class="sec-title-badge" style="background:${p===100?"var(--accent-dark)":p>0?"var(--blue-dark)":"var(--bg-elevated)"};color:${p>0?"#fff":"var(--text-muted)"}">${p}% · ${s.items.filter(i=>isFilled(V[i.id])).length}/${s.items.length}</span></div>`;
  for(const it of s.items){
    const f=isFilled(V[it.id]);
    h+=`<div class="item${f?" filled":""}" id="r_${it.id}">`;
    h+=`<div class="item-head"><span class="item-indicator"></span><span class="item-label">${it.label}</span>`;
    if(it.limit)h+=`<span class="item-limit">${it.limit}</span>`;
    h+=`</div>`;
    if(it.note)h+=`<div class="item-note">📋 ${it.note}</div>`;
    h+=`<div class="item-ctrl">${ctrl(it)}</div>`;
    h+=`<div class="photo-row"><button class="photo-btn" onclick="document.getElementById('f_${it.id}').click()">📷 Foto</button><input type="file" accept="image/*" capture="environment" id="f_${it.id}" style="display:none" onchange="addP('${it.id}',this)"><span id="th_${it.id}">${thumbs(it.id)}</span></div>`;
    h+=`</div>`;
  }
  h+=`<div class="obs-wrap"><div class="obs-label">📝 Observaciones del turno</div><textarea class="obs-textarea" placeholder="Notas adicionales..." oninput="obs=this.value">${obs}</textarea></div>`;
  body.innerHTML=h;
  body.scrollTop=0;
}
function ctrl(it){
  const v=V[it.id];
  if(it.type==="ok")return`<div class="btn-pair"><button class="btn-ok${v==="OK"?" on":""}" onclick="sv('${it.id}',${v==="OK"?"null":"'OK'"})">OK</button><button class="btn-nok${v==="NOK"?" on":""}" onclick="sv('${it.id}',${v==="NOK"?"null":"'NOK'"})">NOK</button></div>`;
  if(it.type==="yn")return`<div class="btn-pair"><button class="btn-si${v==="SÍ"?" on":""}" onclick="sv('${it.id}',${v==="SÍ"?"null":"'SÍ'"})">SÍ</button><button class="btn-no${v==="NO"?" on":""}" onclick="sv('${it.id}',${v==="NO"?"null":"'NO'"})">NO</button></div>`;
  if(it.type==="br")return`<div class="btn-pair"><button class="btn-bl${v==="Blanco"?" on":""}" onclick="sv('${it.id}',${v==="Blanco"?"null":"'Blanco'"})">Blanco</button><button class="btn-rj${v==="Rojo"?" on":""}" onclick="sv('${it.id}',${v==="Rojo"?"null":"'Rojo'"})">Rojo</button></div>`;
  if(it.type==="num")return`<div class="num-wrap"><input class="num-input" type="text" inputmode="decimal" value="${v||""}" placeholder="—" oninput="svq('${it.id}',this.value)"></div>`;
  if(it.type==="text")return`<input class="txt-input" type="text" value="${v||""}" placeholder="Escribir..." oninput="svq('${it.id}',this.value)">`;
  if(it.type==="sel"){const sel=v||[];return`<div class="sel-row">${it.options.map(o=>`<button class="sel-btn${sel.includes(o)?" on":""}" onclick="tgl('${it.id}','${o}')">${o}</button>`).join("")}</div>`;}
  return"";
}
function thumbs(id){return(P[id]||[]).map(p=>`<img src="${p}" class="photo-thumb">`).join("");}
function rFooter(){
  const p=pct();
  document.getElementById("fPct").textContent=p+"%";
  document.getElementById("fFill").style.width=p+"%";
  document.getElementById("fFill").className="f-fill"+(p===100?" done":"");
  document.getElementById("fCount").textContent=filled()+"/"+total();
  document.getElementById("fSend").className="f-send"+(p>0?" ready":"");
}

// ── ACTIONS ──
function pickZone(id){curZone=id;const z=ZONES.find(x=>x.id===id);curSec=z.sections[0].id;rZones();rSecs();rBody();rFooter();}
function pickSec(id){curSec=id;rSecs();rBody();}
function sv(id,v){V[id]=v;upRow(id);rFooter();rZones();rSecs();rBody();}
function svq(id,v){V[id]=v||null;rFooter();rZones();}
function tgl(id,o){let a=V[id]||[];const i=a.indexOf(o);if(i>=0)a.splice(i,1);else a=[...a,o];V[id]=a.length?a:null;upRow(id);rFooter();rZones();rSecs();rBody();}
function upRow(id){/* handled by rBody */}
let FILES={};
function addP(id,inp){const f=inp.files?.[0];if(!f)return;if(!P[id])P[id]=[];if(!FILES[id])FILES[id]=[];P[id].push(URL.createObjectURL(f));FILES[id].push(f);document.getElementById("th_"+id).innerHTML=thumbs(id);inp.value="";}

// ── PHOTO UPLOAD ──
async function uploadPhotos(){
  if(!SUPABASE_URL||!SUPABASE_KEY)return{};
  const urls={};
  for(const id of Object.keys(FILES)){
    if(!FILES[id]||!FILES[id].length)continue;
    urls[id]=[];
    for(let i=0;i<FILES[id].length;i++){
      const file=FILES[id][i];
      const ext=file.name.split('.').pop()||'jpg';
      const path=curTurno+"/"+new Date().toISOString().slice(0,10)+"/"+id+"_"+Date.now()+"_"+i+"."+ext;
      try{
        const r=await fetch(SUPABASE_URL+"/storage/v1/object/fotos-rondas/"+path,{
          method:"POST",
          headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,"Content-Type":file.type||"image/jpeg","x-upsert":"true"},
          body:file
        });
        if(r.ok){urls[id].push(SUPABASE_URL+"/storage/v1/object/public/fotos-rondas/"+path);}
      }catch(e){console.log("Foto error:",e);}
    }
  }
  return urls;
}

// ── SEND ──
async function doSend(){
  const btn=document.getElementById("fSend");
  if(btn.classList.contains("sending"))return;
  btn.classList.add("sending");btn.textContent="SUBIENDO FOTOS...";
  let photoUrls={};
  try{photoUrls=await uploadPhotos();}catch(e){}
  btn.textContent="ENVIANDO DATOS...";
  const payload={fecha:getISO(),fecha_display:getDate(),turno:curTurno,observaciones:obs,valores:V,fotos:photoUrls,total_puntos:total(),puntos_rellenados:filled()};
  let ok=false;
  if(SUPABASE_URL&&SUPABASE_KEY){
    try{
      const r=await fetch(SUPABASE_URL+"/rest/v1/"+TABLE,{method:"POST",headers:{"Content-Type":"application/json",apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,Prefer:"return=minimal"},body:JSON.stringify(payload)});
      if(r.ok)ok=true;else toast("Error: "+r.status,"err");
    }catch(e){toast("Sin conexión. Guardado local.","err");}
  }else{console.log("📤 RONDA:",payload);ok=true;}
  try{localStorage.setItem("ronda_"+Date.now(),JSON.stringify(payload));}catch(e){}
  btn.classList.remove("sending");btn.textContent="ENVIAR";
  if(ok){
    document.getElementById("sentInfo").textContent=getDate()+" · Turno "+curTurno+" · "+filled()+"/"+total()+" puntos";
    document.getElementById("sentOverlay").classList.add("show");
    toast(SUPABASE_URL?"✅ Enviado con fotos a Supabase":"✅ Guardado local (configura Supabase)","ok");
  }
}
function doReset(){V={};P={};FILES={};obs="";curZone=ZONES[0].id;curSec=ZONES[0].sections[0].id;document.getElementById("sentOverlay").classList.remove("show");R();}

// ── INIT ──
R();
</script>
</body>
</html>
