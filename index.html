<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;900&family=JetBrains+Mono:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0f14;--bg2:#111720;--bg3:#0f1520;--border:#1e293b;--border2:#1a2332;
  --t1:#e2e8f0;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;--t5:#475569;
  --green:#4ade80;--green-d:#16a34a;--blue:#3b82f6;--blue-d:#1e40af;
  --red:#dc2626;--amber:#fbbf24;--cyan:#06b6d4;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8;z-index:50}
.logo{display:flex;align-items:center;gap:8}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.logo-text{font-size:13px;font-weight:900;letter-spacing:3px;color:var(--green);text-transform:uppercase}
.logo-sub{font-size:12px;color:var(--t5);font-weight:700}
.turno-box{display:flex;gap:4px}
.turno-btn{padding:7px 14px;font-size:14px;font-weight:800;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--t4);cursor:pointer;font-family:inherit;transition:all .15s}
.turno-btn.active{background:var(--green);color:var(--bg);border-color:var(--green)}

/* ── ZONE TABS ── */
.zone-bar{display:flex;overflow-x:auto;background:var(--bg3);border-bottom:2px solid var(--border2);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:40}
.zone-bar::-webkit-scrollbar{display:none}
.zone-tab{padding:11px 16px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:var(--t5);transition:all .15s;position:relative;user-select:none;flex-shrink:0}
.zone-tab.active{color:#fff;background:var(--bg2)}
.zone-tab .zpct{margin-left:5px;font-size:10px;font-weight:900}

/* ── BODY ── */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.sec-header{position:sticky;top:0;z-index:10;padding:13px 18px;font-size:18px;font-weight:900;color:#fff;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sec-badge{font-size:12px;font-weight:800;padding:3px 10px;border-radius:12px}

/* ── ITEM ROWS ── */
.item{padding:14px 18px;border-bottom:1px solid #141c28;transition:background .15s}
.item.filled{background:#0d1a12}
.item-label{font-size:17px;font-weight:700;color:var(--t2);margin-bottom:10px;line-height:1.35;display:flex;gap:8px;align-items:flex-start}
.item-dot{width:8px;height:8px;border-radius:50%;background:var(--t5);margin-top:7px;flex-shrink:0;transition:background .2s}
.item.filled .item-dot{background:var(--green)}
.item-note{font-size:13px;color:var(--t4);margin-bottom:8px;margin-left:16px;font-weight:600}
.item-ctrl{margin-left:16px}

/* ── BUTTONS OK/NOK ── */
.btn-row{display:flex;gap:8px}
.btn-ok,.btn-nok,.btn-yn,.btn-br{flex:1;padding:12px 0;font-size:18px;font-weight:900;border-radius:10px;border:3px solid var(--border);background:var(--bg2);color:var(--t5);cursor:pointer;font-family:inherit;transition:all .12s;text-align:center}
.btn-ok.active{background:var(--green-d);border-color:var(--green-d);color:#fff}
.btn-nok.active{background:var(--red);border-color:var(--red);color:#fff}
.btn-yn.active-si{background:var(--green-d);border-color:var(--green-d);color:#fff}
.btn-yn.active-no{background:var(--red);border-color:var(--red);color:#fff}
.btn-br.active-b{background:#64748b;border-color:#64748b;color:#fff}
.btn-br.active-r{background:var(--red);border-color:var(--red);color:#fff}

/* ── SEL BUTTONS ── */
.sel-row{display:flex;gap:6px;flex-wrap:wrap}
.sel-btn{padding:11px 15px;font-size:16px;font-weight:800;border-radius:10px;border:2px solid var(--border);background:var(--bg2);color:var(--t4);cursor:pointer;font-family:inherit;min-width:56px;text-align:center;transition:all .12s}
.sel-btn.active{background:var(--blue-d);border-color:var(--blue);color:#fff}

/* ── NUM INPUT ── */
.num-wrap{position:relative}
.num-input{width:100%;padding:12px 16px;font-size:21px;font-weight:800;border-radius:10px;border:2px solid var(--border);background:var(--bg2);color:var(--t1);outline:none;font-family:'JetBrains Mono',monospace;box-sizing:border-box}
.num-input:focus{border-color:var(--blue)}
.num-limit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t4);font-weight:700;pointer-events:none}

/* ── TEXT INPUT ── */
.text-input{width:100%;padding:12px 16px;font-size:18px;font-weight:700;border-radius:10px;border:2px solid var(--border);background:var(--bg2);color:var(--t1);outline:none;font-family:inherit;box-sizing:border-box}
.text-input:focus{border-color:var(--blue)}

/* ── PHOTO ── */
.photo-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.photo-btn{padding:6px 11px;font-size:13px;font-weight:800;border-radius:7px;border:2px solid #92400e;background:#1c1208;color:var(--amber);cursor:pointer;font-family:inherit}
.photo-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;border:2px solid #92400e}

/* ── OBSERVACIONES ── */
.obs-area{padding:20px 18px 140px}
.obs-title{font-size:17px;font-weight:900;color:var(--t2);margin-bottom:10px}
.obs-textarea{width:100%;padding:14px 16px;font-size:17px;font-weight:600;border-radius:12px;border:2px solid var(--border);background:var(--bg2);color:var(--t1);outline:none;resize:vertical;font-family:inherit;box-sizing:border-box;min-height:90px}
.obs-textarea:focus{border-color:var(--blue)}

/* ── FOOTER ── */
.footer{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:50}
.prog-pct{font-size:14px;font-weight:800;color:var(--t4);min-width:42px}
.prog-bar{flex:1;height:10px;border-radius:5px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .4s;background:linear-gradient(90deg,var(--blue),var(--cyan))}
.prog-fill.done{background:var(--green-d)}
.prog-count{font-size:12px;font-weight:700;color:var(--t5)}
.send-btn{padding:10px 22px;font-size:15px;font-weight:900;border-radius:10px;border:none;cursor:pointer;font-family:inherit;background:var(--border);color:var(--t4);transition:all .2s}
.send-btn.ready{background:var(--green);color:var(--bg)}
.send-btn.sending{opacity:.5;pointer-events:none}

/* ── SENT SCREEN ── */
.sent-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:24px;text-align:center}
.sent-screen.show{display:flex}
.sent-icon{font-size:72px}
.sent-title{font-size:26px;font-weight:900}
.sent-sub{font-size:17px;color:var(--green);font-weight:700}
.sent-btn{margin-top:20px;padding:16px 40px;font-size:17px;font-weight:900;border-radius:12px;border:none;background:var(--green);color:var(--bg);cursor:pointer;font-family:inherit}

/* ── STATUS TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:15px;font-weight:800;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{background:#16a34a;color:#fff}
.toast.err{background:#dc2626;color:#fff}
</style>

// ─── STATE ──────────────────────────────────────────
let currentZone = ZONES[0].id;
let currentTurno = "Mañana";
let vals = {};
let pics = {};
let obs = "";

// ─── HELPERS ────────────────────────────────────────
const isFilled = v => v!=null && v!=="" && !(Array.isArray(v)&&!v.length);
const allItems = () => ZONES.flatMap(z=>z.sections.flatMap(s=>s.items));
const totalCount = () => allItems().length;
const filledCount = () => allItems().filter(it=>isFilled(vals[it.id])).length;
const globalPct = () => { const t=totalCount(); return t?Math.round(filledCount()/t*100):0; };
const zonePct = z => { const items=z.sections.flatMap(s=>s.items); const f=items.filter(it=>isFilled(vals[it.id])).length; return items.length?Math.round(f/items.length*100):0; };
const secPct = s => { const f=s.items.filter(it=>isFilled(vals[it.id])).length; return s.items.length?Math.round(f/s.items.length*100):0; };

function showToast(msg, type) {
  const t=document.getElementById("toast"); t.textContent=msg; t.className="toast show "+type;
  setTimeout(()=>t.className="toast",3000);
}

// ─── RENDER ─────────────────────────────────────────
function renderTurnos() {
  const box=document.getElementById("turnoBox");
  box.innerHTML=["Mañana","Tarde","Noche"].map(t=>
    `<button class="turno-btn${currentTurno===t?" active":""}" onclick="setTurno('${t}')">${t==="Mañana"?"☀️":t==="Tarde"?"🌅":"🌙"} ${t}</button>`
  ).join("");
}

function renderZoneTabs() {
  const bar=document.getElementById("zoneBar");
  bar.innerHTML=ZONES.map(z=>{
    const zp=zonePct(z);
    return `<div class="zone-tab${currentZone===z.id?" active":""}" style="${currentZone===z.id?`border-bottom-color:${z.color}`:""}" onclick="setZone('${z.id}')">${z.short}${zp>0?`<span class="zpct" style="color:${zp===100?"#4ade80":"#60a5fa"}">${zp}%</span>`:""}</div>`;
  }).join("");
}

function renderBody() {
  const z=ZONES.find(x=>x.id===currentZone);
  if(!z) return;
  const body=document.getElementById("bodyEl");
  let html="";
  for(const sec of z.sections) {
    const sp=secPct(sec);
    html+=`<div class="sec-header" style="background:linear-gradient(135deg,${z.color}18,${z.color}08);border-left:4px solid ${z.color}"><span>${sec.name}</span><span class="sec-badge" style="background:${sp===100?"#16a34a":sp>0?"#1e40af":"#1e293b"};color:${sp>0?"#fff":"#64748b"}">${sp}%</span></div>`;
    for(const item of sec.items) {
      const filled=isFilled(vals[item.id]);
      html+=`<div class="item${filled?" filled"}" id="row_${item.id}">`;
      html+=`<div class="item-label"><span class="item-dot"></span><span>${item.label}</span></div>`;
      if(item.note) html+=`<div class="item-note">📋 ${item.note}</div>`;
      html+=`<div class="item-ctrl">${renderControl(item)}</div>`;
      html+=`<div class="photo-row"><button class="photo-btn" onclick="triggerPhoto('${item.id}')">📷 Foto</button><input type="file" accept="image/*" capture="environment" id="file_${item.id}" style="display:none" onchange="addPhoto('${item.id}',this)"><span id="thumbs_${item.id}">${renderThumbs(item.id)}</span></div>`;
      html+=`</div>`;
    }
  }
  html+=`<div class="obs-area"><div class="obs-title">📝 Observaciones del turno</div><textarea class="obs-textarea" id="obsArea" placeholder="Notas adicionales..." oninput="obs=this.value">${obs}</textarea></div>`;
  body.innerHTML=html;
}

function renderControl(item) {
  const v=vals[item.id];
  if(item.type==="ok") return `<div class="btn-row"><button class="btn-ok${v==="OK"?" active":""}" onclick="setVal('${item.id}',${v==="OK"?"null":"'OK'"})">OK</button><button class="btn-nok${v==="NOK"?" active":""}" onclick="setVal('${item.id}',${v==="NOK"?"null":"'NOK'"})">NOK</button></div>`;
  if(item.type==="yn") return `<div class="btn-row"><button class="btn-yn${v==="SÍ"?" active-si":""}" onclick="setVal('${item.id}',${v==="SÍ"?"null":"'SÍ'"})">SÍ</button><button class="btn-yn${v==="NO"?" active-no":""}" onclick="setVal('${item.id}',${v==="NO"?"null":"'NO'"})">NO</button></div>`;
  if(item.type==="br") return `<div class="btn-row"><button class="btn-br${v==="Blanco"?" active-b":""}" onclick="setVal('${item.id}',${v==="Blanco"?"null":"'Blanco'"})">Blanco</button><button class="btn-br${v==="Rojo"?" active-r":""}" onclick="setVal('${item.id}',${v==="Rojo"?"null":"'Rojo'"})">Rojo</button></div>`;
  if(item.type==="num") return `<div class="num-wrap"><input class="num-input" type="text" inputmode="decimal" value="${v||""}" placeholder="—" oninput="setValQuiet('${item.id}',this.value)" style="${item.limit?"padding-right:100px":""}">${item.limit?`<span class="num-limit">${item.limit}</span>`:""}</div>`;
  if(item.type==="text") return `<input class="text-input" type="text" value="${v||""}" placeholder="Escribir..." oninput="setValQuiet('${item.id}',this.value)">`;
  if(item.type==="sel") {
    const sel=v||[];
    return `<div class="sel-row">${item.options.map(o=>`<button class="sel-btn${sel.includes(o)?" active":""}" onclick="toggleSel('${item.id}','${o}')">${o}</button>`).join("")}</div>`;
  }
  return "";
}

function renderThumbs(id) {
  return (pics[id]||[]).map(p=>`<img src="${p}" class="photo-thumb">`).join("");
}

function updateFooter() {
  const p=globalPct(),f=filledCount(),t=totalCount();
  document.getElementById("progPct").textContent=p+"%";
  document.getElementById("progFill").style.width=p+"%";
  document.getElementById("progFill").className="prog-fill"+(p===100?" done":"");
  document.getElementById("progCount").textContent=f+"/"+t;
  const btn=document.getElementById("sendBtn");
  btn.className="send-btn"+(p>0?" ready":"");
}

function renderAll() { renderTurnos(); renderZoneTabs(); renderBody(); updateFooter(); }

// ─── ACTIONS ────────────────────────────────────────
function setTurno(t) { currentTurno=t; renderTurnos(); }
function setZone(id) { currentZone=id; renderZoneTabs(); renderBody(); document.getElementById("bodyEl").scrollTop=0; }

function setVal(id,v) {
  vals[id]=v;
  // re-render just that row and update footer+tabs
  const row=document.getElementById("row_"+id);
  if(row) { row.className="item"+(isFilled(v)?" filled":""); row.querySelector(".item-dot").style.background=isFilled(v)?"#4ade80":"#334155"; row.querySelector(".item-ctrl").innerHTML=renderControl(allItems().find(x=>x.id===id)); }
  updateFooter(); renderZoneTabs();
}

function setValQuiet(id,v) {
  vals[id]=v||null;
  const row=document.getElementById("row_"+id);
  if(row) { const f=isFilled(vals[id]); row.className="item"+(f?" filled":""); row.querySelector(".item-dot").style.background=f?"#4ade80":"#334155"; }
  updateFooter(); renderZoneTabs();
}

function toggleSel(id,opt) {
  let arr=vals[id]||[];
  const i=arr.indexOf(opt);
  if(i>=0) arr.splice(i,1); else arr=[...arr,opt];
  vals[id]=arr.length?arr:null;
  const item=allItems().find(x=>x.id===id);
  const row=document.getElementById("row_"+id);
  if(row&&item) { const f=isFilled(vals[id]); row.className="item"+(f?" filled":""); row.querySelector(".item-dot").style.background=f?"#4ade80":"#334155"; row.querySelector(".item-ctrl").innerHTML=renderControl(item); }
  updateFooter(); renderZoneTabs();
}

function triggerPhoto(id) { document.getElementById("file_"+id)?.click(); }
function addPhoto(id,input) {
  const f=input.files?.[0];
  if(!f) return;
  if(!pics[id]) pics[id]=[];
  pics[id].push(URL.createObjectURL(f));
  document.getElementById("thumbs_"+id).innerHTML=renderThumbs(id);
  input.value="";
}

// ─── SEND ───────────────────────────────────────────
async function handleSend() {
  const btn=document.getElementById("sendBtn");
  if(btn.classList.contains("sending")) return;
  btn.classList.add("sending"); btn.textContent="Enviando...";

  const payload = {
    fecha: new Date().toISOString(),
    turno: currentTurno,
    observaciones: obs,
    valores: vals,
    fotos_count: Object.keys(pics).reduce((a,k)=>{ a[k]=(pics[k]||[]).length; return a; },{}),
    total_puntos: totalCount(),
    puntos_rellenados: filledCount(),
  };

  let ok = false;

  // ── ENVÍO A SUPABASE ──
  if (SUPABASE_URL && SUPABASE_KEY) {
    try {
      const res = await fetch(SUPABASE_URL + "/rest/v1/" + SUPABASE_TABLE, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          fecha: payload.fecha,
          turno: payload.turno,
          observaciones: payload.observaciones,
          valores: payload.valores,
          fotos_count: payload.fotos_count,
          total_puntos: payload.total_puntos,
          puntos_rellenados: payload.puntos_rellenados,
        })
      });
      if (res.ok) { ok=true; }
      else { showToast("Error al enviar: "+res.status,"err"); }
    } catch(e) { showToast("Sin conexión. Guardado local.","err"); }
  } else {
    console.log("📤 RONDA (sin Supabase configurado):", payload);
    ok = true;
  }

  // Guardar copia local siempre
  try { localStorage.setItem("ronda_backup_"+Date.now(), JSON.stringify(payload)); } catch(e){}

  btn.classList.remove("sending"); btn.textContent="📤 ENVIAR";
  if(ok) {
    document.getElementById("sentSub").textContent=`Turno ${currentTurno} · ${new Date().toLocaleDateString("es-ES")} · ${filledCount()}/${totalCount()} puntos`;
    document.getElementById("sentScreen").classList.add("show");
    if(SUPABASE_URL) showToast("✅ Enviado a la base de datos","ok");
    else showToast("✅ Ronda guardada (configura Supabase para envío cloud)","ok");
  }
}

function resetApp() {
  vals={}; pics={}; obs=""; currentZone=ZONES[0].id;
  document.getElementById("sentScreen").classList.remove("show");
  renderAll();
}

// ─── INIT ───────────────────────────────────────────
renderAll();
</script>
